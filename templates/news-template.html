<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>科技新闻快报</title>
    <style>
        @page {
            size: A4;
            margin: 2cm;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 12pt;
            line-height: 1.6;
            color: #333;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #0066cc;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24pt;
            color: #0066cc;
            margin-bottom: 10px;
        }

        .header .date {
            font-size: 14pt;
            color: #666;
        }

        .summary {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .news-item {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .news-item h2 {
            font-size: 16pt;
            color: #333;
            margin-bottom: 8px;
        }

        .news-item .meta {
            font-size: 10pt;
            color: #888;
            margin-bottom: 10px;
        }

        .news-item .content {
            font-size: 11pt;
            color: #555;
            margin-bottom: 10px;
            text-align: justify;
        }

        .news-item .link {
            font-size: 10pt;
            color: #0066cc;
        }

        .entities {
            margin-top: 8px;
        }

        .entity {
            display: inline-block;
            background: #e8f4fd;
            color: #0066cc;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 9pt;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <!-- 新闻内容将在这里填充 -->
</body>
</html>
