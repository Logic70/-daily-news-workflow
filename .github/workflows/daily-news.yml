name: Daily News Generator

on:
  schedule:
    # 每天 UTC 01:00 运行（北京时间 09:00）
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD)'
        required: false
        default: ''
  push:
    branches: [ main, master ]

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Generate daily news
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      run: |
        mkdir -p docs cache
        if [ -n "${{ github.event.inputs.date }}" ]; then
          python scripts/fetch-news.py --date ${{ github.event.inputs.date }} --output cache/daily-news.json
        else
          python scripts/fetch-news.py --output cache/daily-news.json
        fi
        python scripts/generate-all.py --input cache/daily-news.json --output-dir docs --summary

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs'

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
